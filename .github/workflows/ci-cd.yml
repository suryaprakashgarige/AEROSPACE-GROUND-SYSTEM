# .github/workflows/ci-cd.yml
name: Ground Station CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint & Test Applications
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Backend Test Pipeline
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8 pytest httpx

      - name: Lint Python Code
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Backend Unit Tests
        run: |
          export PYTHONPATH=$GITHUB_WORKSPACE
          pytest backend/tests

      # Frontend Build Test
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Compile and Build Frontend
        run: |
          cd frontend
          npm run build

  security-scan:
    name: Container & Code Security Scanning
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner on code
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  build-and-push:
    name: Build & Push Container Images
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ground-station-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ground-station-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/ground-station-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/ground-station-backend:buildcache,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ground-station-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ground-station-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/ground-station-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/ground-station-frontend:buildcache,mode=max

  terraform-validate:
    name: Infrastructure Linting & Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Format Check
        run: |
          cd terraform
          terraform fmt

      - name: Terraform Validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

  deploy:
    name: Kubernetes Continuous Deployment
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform-validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup kubeconfig for EKS Cluster
        run: |
          aws eks update-kubeconfig --name solvrex-satellite-telemetry-cluster --region us-east-1

      - name: Apply ConfigMaps and Secrets
        run: |
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/secrets.yaml
          kubectl apply -f kubernetes/configmap.yaml

      - name: Apply Deployments
        run: |
          kubectl apply -f kubernetes/postgres-deployment.yaml
          kubectl apply -f kubernetes/backend-deployment.yaml
          kubectl apply -f kubernetes/frontend-deployment.yaml
          kubectl apply -f kubernetes/hpa.yaml
          kubectl apply -f kubernetes/ingress.yaml
          kubectl apply -f kubernetes/rbac.yaml

      - name: Verify Deployment Rollout Status
        run: |
          kubectl rollout status deployment/ground-station-backend -n aerospace-monitoring --timeout=300s
          kubectl rollout status deployment/ground-station-frontend -n aerospace-monitoring --timeout=300s
